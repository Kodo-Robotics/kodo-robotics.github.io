title: "Kodo Robotics"
description: "コード・ロボティクス — Code for the future of robotics"
url: "https://kodorobotics.com"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.24.0"

plugins:
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-feed

markdown: kramdown
permalink: /:categories/:title/
minimal_mistakes_skin: "dark"
logo: "/assets/images/logo.png"
favicon: "/assets/images/favicon.ico"

author:
  name: "Kodo Robotics"

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-GHPB11M47Y"
    anonymize_ip: false

atom_feed:
  hide: true

footer:
  links:
    - label: "Get in touch"
      icon: "fas fa-paper-plane"
      url: "https://forms.gle/LADwun8N6qUuXpwh7"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:kodorobotics@gmail.com"